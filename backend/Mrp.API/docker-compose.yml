version: "3.9"
services:
  postgres:
    container_name: postgres
    image: postgres:latest
    environment:
      POSTGRES_DB: "mrpdb"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "SNA280205"
    volumes:
      - postgres-data:/var/lib/postgresql
    ports:
      - "5432:5432"

volumes:
  postgres-data: